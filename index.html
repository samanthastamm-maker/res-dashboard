<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truehold · RES Sales Dashboard</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=sentient@400,400i,700,700i&f[]=roobert@300,400,500,600&display=swap">
<style>
:root {
  --primary-500:#c4cfcc;--primary-400:#e8eceb;--primary-300:#f3f5f5;--primary-200:#f8f9f9;
  --white:#ffffff;--hero-bg:#214037;--dark-green:#03261c;
  --green-action-800:#488577;--green-action-300:#bee8ce;
  --bg:var(--primary-400);--border:rgba(3,38,28,0.1);--border2:rgba(3,38,28,0.18);
  --text:var(--dark-green);--text2:#2d5040;--text3:var(--green-action-800);
  --red:#b83228;--red-dim:rgba(184,50,40,0.07);--red-border:rgba(184,50,40,0.18);
  --amber:#9a5200;--amber-dim:rgba(154,82,0,0.07);--amber-border:rgba(154,82,0,0.18);
  --blue:#1a4a8a;--blue-dim:rgba(26,74,138,0.07);--blue-border:rgba(26,74,138,0.18);
  --ok:var(--green-action-800);--ok-dim:rgba(72,133,119,0.07);--ok-border:rgba(72,133,119,0.18);
  --font-display:'Sentient',Georgia,serif;--font-body:'Roobert',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}

/* PASSWORD GATE */
.pw-gate{position:fixed;inset:0;z-index:10000;background:var(--dark-green);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pw-gate.hidden{display:none}
.pw-gate-logo{font-family:var(--font-display);font-size:32px;font-style:italic;color:var(--white)}
.pw-gate-sub{font-family:var(--font-body);font-size:12px;font-weight:300;color:rgba(255,255,255,0.4);margin-bottom:8px}
.pw-input{font-family:var(--font-body);font-size:14px;color:var(--white);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:12px 20px;border-radius:10px;width:260px;text-align:center;outline:none}
.pw-input::placeholder{color:rgba(255,255,255,0.25)}
.pw-input:focus{border-color:rgba(255,255,255,0.35)}
.pw-btn{font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--dark-green);background:var(--green-action-300);border:none;padding:10px 32px;border-radius:20px;cursor:pointer}
.pw-btn:hover{background:var(--white)}
.pw-error{font-family:var(--font-body);font-size:11px;color:#ff9b92;height:16px}

/* HEADER */
.header{position:sticky;top:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--dark-green);border-bottom:1px solid rgba(255,255,255,0.06)}
.logo{display:flex;align-items:center;gap:16px}
.logo-name{font-family:var(--font-display);font-size:22px;font-style:italic;color:var(--white)}
.logo-divider{width:1px;height:18px;background:rgba(255,255,255,0.2)}
.logo-sub{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.5)}
.header-right{display:flex;align-items:center;gap:16px}
.as-of{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.4);text-align:right;line-height:1.7}
.tab-bar{display:flex;gap:2px;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px}
.tab-btn{font-family:var(--font-body);font-size:11px;font-weight:400;color:rgba(255,255,255,0.5);background:none;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .15s}
.tab-btn:hover{color:rgba(255,255,255,0.8)}
.tab-btn.active{background:rgba(255,255,255,0.12);color:var(--white);font-weight:500}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);background:var(--hero-bg)}
.stat{padding:20px 28px;border-right:1px solid rgba(255,255,255,0.07);transition:background .15s}
.stat:last-child{border-right:none}
.stat:hover{background:rgba(255,255,255,0.04)}
.stat-val{font-family:var(--font-display);font-size:42px;font-weight:700;line-height:1;letter-spacing:-2px;color:var(--white)}
.stat-val.red{color:#ff7b6e}.stat-val.amber{color:#ffbe5c}.stat-val.green{color:var(--green-action-300)}
.stat-sub{font-family:var(--font-body);font-size:18px;font-weight:300;color:rgba(255,255,255,0.5);margin-left:4px}
.stat-label{font-family:var(--font-body);font-size:10px;font-weight:400;color:rgba(255,255,255,0.45);margin-top:5px}

/* LAYOUT */
.main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 130px)}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:18px 0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;background:var(--primary-300)}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--primary-500);border-radius:2px}
.sidebar-heading{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:10px 18px 5px}
.sidebar-divider{height:1px;background:var(--border);margin:10px 0}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:400;cursor:pointer;text-align:left;transition:all .12s;position:relative}
.filter-btn:hover{background:rgba(3,38,28,0.05)}
.filter-btn.active{background:rgba(3,38,28,0.08);color:var(--dark-green);font-weight:500}
.filter-btn.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--hero-bg);border-radius:0 2px 2px 0}
.filter-count{font-family:var(--font-body);font-size:11px;font-weight:500;background:rgba(3,38,28,0.07);padding:2px 8px;border-radius:20px;color:var(--text3)}

/* CONTENT */
.content{padding:24px;overflow-y:auto;height:calc(100vh - 62px);position:sticky;top:62px}

/* VIEW PANELS */
.view-panel{display:none}
.view-panel.active{display:block}

/* REP SCORECARDS */
.team-section{margin-bottom:32px}
.team-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.team-name{font-family:var(--font-display);font-size:20px;font-style:italic;color:var(--text)}
.team-stats{font-family:var(--font-body);font-size:12px;color:var(--text3)}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.rep-card{background:var(--white);border-radius:12px;padding:18px 20px;border:1px solid var(--border);transition:all .15s;position:relative;overflow:hidden}
.rep-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(3,38,28,0.06)}
.rep-name{font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--dark-green)}
.rep-p2g{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-1px;margin-top:8px}
.rep-p2g.high{color:var(--ok)}.rep-p2g.mid{color:var(--amber)}.rep-p2g.low{color:var(--red)}
.rep-p2g-label{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.rep-bar{height:4px;background:rgba(3,38,28,0.06);border-radius:2px;margin-top:12px;overflow:hidden}
.rep-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.rep-bar-fill.high{background:var(--ok)}.rep-bar-fill.mid{background:var(--amber)}.rep-bar-fill.low{background:var(--red)}
.rep-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.rep-metric-label{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.rep-metric-val{font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--text);margin-top:2px}
.rep-metric-quota{font-family:var(--font-body);font-size:11px;font-weight:300;color:var(--text3)}

/* EDITABLE GOAL INPUT */
.goal-input{font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--text);background:var(--primary-300);border:1px solid var(--border);border-radius:6px;padding:2px 6px;width:48px;text-align:center;outline:none}
.goal-input:focus{border-color:var(--hero-bg);background:var(--white)}

/* CAMPAIGN CARDS */
.campaign-card{background:var(--white);border-radius:12px;padding:16px 20px;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:all .12s}
.campaign-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(3,38,28,0.06)}
.campaign-card.expanded{border-color:var(--hero-bg)}
.camp-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.camp-name{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--dark-green);flex:1}
.camp-meta{font-family:var(--font-body);font-size:11px;font-weight:300;color:var(--text3);margin-top:3px}
.camp-badges{display:flex;gap:6px;align-items:center}
.camp-badge{font-family:var(--font-body);font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px}
.badge-conversions{background:var(--ok-dim);color:var(--ok);border:1px solid var(--ok-border)}
.badge-delivered{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.badge-cvr{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--dark-green);letter-spacing:-0.5px}

/* SPARKLINE */
.sparkline{display:flex;align-items:end;gap:2px;height:28px}
.spark-bar{width:12px;border-radius:2px 2px 0 0;background:var(--green-action-300);transition:height .3s;min-height:1px}
.spark-bar.zero{background:rgba(3,38,28,0.08)}

/* MESSAGE DETAIL */
.msg-list{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.campaign-card.expanded .msg-list{display:block}
.msg-row{display:grid;grid-template-columns:1fr 80px 60px 60px;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center}
.msg-row:last-child{border-bottom:none}
.msg-name{font-family:var(--font-body);font-size:11px;font-weight:400;color:var(--text2)}
.msg-type{font-family:var(--font-body);font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.msg-type.email{background:var(--blue-dim);color:var(--blue)}.msg-type.sms{background:var(--amber-dim);color:var(--amber)}
.msg-val{font-family:var(--font-body);font-size:11px;font-weight:500;color:var(--text);text-align:right}
.msg-header{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}

/* TREND CHART */
.trend-section{margin-bottom:32px}
.trend-title{font-family:var(--font-display);font-size:20px;font-style:italic;color:var(--text);margin-bottom:16px}
.trend-chart{background:var(--white);border-radius:12px;padding:24px;border:1px solid var(--border)}
.trend-bars{display:flex;align-items:end;gap:12px;height:160px;padding-top:20px}
.trend-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:6px}
.trend-bar-wrap{width:100%;display:flex;gap:3px;align-items:end;height:120px}
.trend-bar{flex:1;border-radius:4px 4px 0 0;transition:height .4s}
.trend-bar.del{background:var(--primary-500)}.trend-bar.conv{background:var(--hero-bg)}
.trend-label{font-family:var(--font-body);font-size:10px;color:var(--text3);font-weight:400}
.trend-val{font-family:var(--font-body);font-size:11px;font-weight:500;color:var(--text)}
.trend-legend{display:flex;gap:20px;margin-top:16px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:11px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:2px}

/* GOALS EDITOR */
.goals-section{background:var(--white);border-radius:12px;padding:20px 24px;border:1px solid var(--border);margin-bottom:24px}
.goals-title{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.goals-grid{display:grid;grid-template-columns:140px repeat(4,1fr);gap:8px;align-items:center}
.goals-header{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;text-align:center;padding-bottom:6px;border-bottom:1px solid var(--border)}
.goals-name{font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--text);padding:6px 0}
.goals-val{text-align:center;padding:4px 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.rep-card,.campaign-card{animation:fadeUp .2s ease both}
</style>
</head>

<div class="header" id="mainHeader">
  <div class="logo">
    <span class="logo-name">truehold</span>
    <span class="logo-divider"></span>
    <span class="logo-sub">RES Sales Dashboard</span>
  </div>
  <div class="header-right">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchView('scorecard',this)">Rep Scorecard</button>
      <button class="tab-btn" onclick="switchView('campaigns',this)">Campaign Performance</button>
      <button class="tab-btn" onclick="switchView('goals',this)">Edit Goals</button>
    </div>
    <div class="as-of" id="asOf"></div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main" id="mainLayout">
  <div class="sidebar">
    <div class="sidebar-heading">View</div>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All Reps <span class="filter-count" id="cnt-all">—</span></button>
    <button class="filter-btn" data-filter="above" onclick="setFilter('above',this)">🟢 Above 50% P2G <span class="filter-count" id="cnt-above">—</span></button>
    <button class="filter-btn" data-filter="below" onclick="setFilter('below',this)">🔴 Below 30% P2G <span class="filter-count" id="cnt-below">—</span></button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">Team</div>
    <button class="filter-btn" data-filter="alex" onclick="setFilter('alex',this)">Team Alex <span class="filter-count" id="cnt-alex">—</span></button>
    <button class="filter-btn" data-filter="zach" onclick="setFilter('zach',this)">Team Zach <span class="filter-count" id="cnt-zach">—</span></button>
    <button class="filter-btn" data-filter="prt" onclick="setFilter('prt',this)">Portfolios <span class="filter-count" id="cnt-prt">—</span></button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">Channel</div>
    <button class="filter-btn" data-filter="email" onclick="setFilter('email',this)">📧 Email <span class="filter-count" id="cnt-email">—</span></button>
    <button class="filter-btn" data-filter="sms" onclick="setFilter('sms',this)">💬 SMS <span class="filter-count" id="cnt-sms">—</span></button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">Campaigns</div>
    <button class="filter-btn" data-filter="top10" onclick="setFilter('top10',this)">🏆 Top 10 Converters <span class="filter-count">10</span></button>
    <button class="filter-btn" data-filter="zero" onclick="setFilter('zero',this)">⚠️ Zero Conversions <span class="filter-count" id="cnt-zero">—</span></button>
  </div>

  <div class="content" id="contentArea">
    <!-- SCORECARD VIEW -->
    <div class="view-panel active" id="view-scorecard"></div>
    <!-- CAMPAIGNS VIEW -->
    <div class="view-panel" id="view-campaigns"></div>
    <!-- GOALS VIEW -->
    <div class="view-panel" id="view-goals"></div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function p2gClass(pct){ return pct>=50?'high':pct>=30?'mid':'low'; }
function p2gColor(pct){ return pct>=50?'green':pct>=30?'amber':'red'; }

function getAllReps(){
  const reps=[];
  for(const[team,data] of Object.entries(TEAMS)){
    data.members.forEach(m=>{
      const total_quota=m.d2c_quota+m.red_quota;
      const total=m.d2c+m.red;
      const p2g=total_quota>0?Math.round(total/total_quota*100):0;
      reps.push({...m, team, total_quota, total, p2g});
    });
  }
  return reps;
}

// ══════════════════════════════════════════════════════════════════
// STATS BAR
// ══════════════════════════════════════════════════════════════════
function renderStats(){
  const reps=getAllReps();
  const totalQuota=reps.reduce((s,r)=>s+r.total_quota,0);
  const totalSigned=reps.reduce((s,r)=>s+r.total,0);
  const totalP2G=totalQuota>0?Math.round(totalSigned/totalQuota*100):0;
  const d2cSigned=reps.reduce((s,r)=>s+r.d2c,0);
  const redSigned=reps.reduce((s,r)=>s+r.red,0);
  const above50=reps.filter(r=>r.p2g>=50).length;

  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-val ${p2gColor(totalP2G)}">${totalP2G}<span class="stat-sub">%</span></div><div class="stat-label">Total Pace to Goal</div></div>
    <div class="stat"><div class="stat-val">${totalSigned}<span class="stat-sub">/ ${totalQuota}</span></div><div class="stat-label">Total Signed / Quota</div></div>
    <div class="stat"><div class="stat-val">${d2cSigned}</div><div class="stat-label">D2C Signed</div></div>
    <div class="stat"><div class="stat-val">${redSigned}</div><div class="stat-label">RE Direct Signed</div></div>
    <div class="stat"><div class="stat-val green">${above50}</div><div class="stat-label">Reps Above 50% P2G</div></div>`;
}

// ══════════════════════════════════════════════════════════════════
// SCORECARD VIEW
// ══════════════════════════════════════════════════════════════════
function renderScorecard(){
  const panel=document.getElementById('view-scorecard');
  let html='';

  for(const[teamName,data] of Object.entries(TEAMS)){
    if(currentFilter==='alex'&&teamName!=='Team Alex') continue;
    if(currentFilter==='zach'&&teamName!=='Team Zach') continue;
    if(currentFilter==='prt'&&teamName!=='Portfolios') continue;

    const teamReps=data.members.map(m=>{
      const tq=m.d2c_quota+m.red_quota;
      const t=m.d2c+m.red;
      return{...m,total_quota:tq,total:t,p2g:tq>0?Math.round(t/tq*100):0};
    });

    let filteredReps=teamReps;
    if(currentFilter==='above') filteredReps=teamReps.filter(r=>r.p2g>=50);
    if(currentFilter==='below') filteredReps=teamReps.filter(r=>r.p2g<30);
    if(filteredReps.length===0) continue;

    filteredReps.sort((a,b)=>b.p2g-a.p2g);

    const teamTotal=teamReps.reduce((s,r)=>s+r.total,0);
    const teamQuota=teamReps.reduce((s,r)=>s+r.total_quota,0);
    const teamP2G=teamQuota>0?Math.round(teamTotal/teamQuota*100):0;

    html+=`<div class="team-section">
      <div class="team-header">
        <div class="team-name">${teamName}</div>
        <div class="team-stats">${teamTotal} / ${teamQuota} signed · <strong>${teamP2G}% P2G</strong></div>
      </div>
      <div class="rep-grid">${filteredReps.map((r,i)=>`
        <div class="rep-card" style="animation-delay:${i*40}ms">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <div>
              <div class="rep-name">${r.name}</div>
              <div class="rep-p2g-label">Pace to Goal</div>
            </div>
            <div class="rep-p2g ${p2gClass(r.p2g)}">${r.p2g}%</div>
          </div>
          <div class="rep-bar"><div class="rep-bar-fill ${p2gClass(r.p2g)}" style="width:${Math.min(r.p2g,100)}%"></div></div>
          <div class="rep-metrics">
            <div><div class="rep-metric-label">D2C</div><div class="rep-metric-val">${r.d2c}</div><div class="rep-metric-quota">of ${r.d2c_quota} quota</div></div>
            <div><div class="rep-metric-label">RE Direct</div><div class="rep-metric-val">${r.red}</div><div class="rep-metric-quota">of ${r.red_quota} quota</div></div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }
  panel.innerHTML=html;
}

        ${msgRows}
      </div>
    </div>`;
  });

  panel.innerHTML=html;
}

function toggleCamp(idx){
  document.getElementById(`camp-${idx}`).classList.toggle('expanded');
}

// ══════════════════════════════════════════════════════════════════
// GOALS EDITOR
// ══════════════════════════════════════════════════════════════════
function renderGoals(){
  const panel=document.getElementById('view-goals');
  let html=`<div style="font-family:var(--font-body);font-size:13px;color:var(--text3);margin-bottom:20px;">
    Edit quotas and actuals below. Changes update the scorecard and stats immediately.
  </div>`;

  for(const[teamName,data] of Object.entries(TEAMS)){
    html+=`<div class="goals-section">
      <div class="goals-title">${teamName}</div>
      <div class="goals-grid">
        <div class="goals-header">Rep</div>
        <div class="goals-header">D2C Quota</div>
        <div class="goals-header">D2C Actual</div>
        <div class="goals-header">RED Quota</div>
        <div class="goals-header">RED Actual</div>
        ${data.members.map((m,i)=>`
          <div class="goals-name">${m.name}</div>
          <div class="goals-val"><input class="goal-input" type="number" value="${m.d2c_quota}" onchange="updateGoal('${teamName}',${i},'d2c_quota',this.value)"></div>
          <div class="goals-val"><input class="goal-input" type="number" value="${m.d2c}" onchange="updateGoal('${teamName}',${i},'d2c',this.value)"></div>
          <div class="goals-val"><input class="goal-input" type="number" value="${m.red_quota}" onchange="updateGoal('${teamName}',${i},'red_quota',this.value)"></div>
          <div class="goals-val"><input class="goal-input" type="number" value="${m.red}" onchange="updateGoal('${teamName}',${i},'red',this.value)"></div>
        `).join('')}
      </div>
    </div>`;
  }
  panel.innerHTML=html;
}

function updateGoal(team,idx,field,val){
  TEAMS[team].members[idx][field]=parseInt(val)||0;
  renderStats();
  renderScorecard();
  updateCounts();
}

// ══════════════════════════════════════════════════════════════════
// FILTERS & VIEWS
// ══════════════════════════════════════════════════════════════════
function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderScorecard();
  renderCampaigns();
}

function switchView(view,btn){
  currentView=view;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  if(view==='goals') renderGoals();
}

function updateCounts(){
  const reps=getAllReps();
  document.getElementById('cnt-all').textContent=reps.length;
  document.getElementById('cnt-above').textContent=reps.filter(r=>r.p2g>=50).length;
  document.getElementById('cnt-below').textContent=reps.filter(r=>r.p2g<30).length;
  document.getElementById('cnt-alex').textContent=TEAMS['Team Alex'].members.length;
  document.getElementById('cnt-zach').textContent=TEAMS['Team Zach'].members.length;
  document.getElementById('cnt-prt').textContent=TEAMS['Portfolios'].members.length;

  const camps=CAMP_DATA.campaigns;
  document.getElementById('cnt-email').textContent=camps.filter(c=>c.types.includes('email')).length;
  document.getElementById('cnt-sms').textContent=camps.filter(c=>c.types.includes('sms')).length;
  document.getElementById('cnt-zero').textContent=camps.filter(c=>c.total_conversions===0).length;
}

// ══════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════
function boot(){
  const now=new Date();
  document.getElementById('asOf').innerHTML=`<div>${now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div><div>April 2026 · ${CAMP_DATA.summary.total_campaigns} campaigns</div>`;
  renderStats();
  renderScorecard();
  renderCampaigns();
  updateCounts();
}
</script>
</body>
</html>
